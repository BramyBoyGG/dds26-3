version: "3"
services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
    # Single worker so the consumer thread and checkout endpoint share the
    # same process.  Increase workers only after switching to Redis polling
    # (already done) and verifying correctness under load.
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 60 --log-level=info app:app
    env_file:
      - env/order_redis.env
    depends_on:
      - order-db
      - stock-db
      - payment-db

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-service:
    build: ./stock
    image: stock:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      - stock-db

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-service:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    image: user:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
    environment:
      - ORDER_REDIS_HOST=order-db
      - ORDER_REDIS_PORT=6379
      - ORDER_REDIS_PASSWORD=redis
      - ORDER_REDIS_DB=0
    depends_on:
      - payment-db
      - order-db

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
