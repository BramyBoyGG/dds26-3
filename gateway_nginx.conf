worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # Docker internal DNS — re-resolve every 5s to distribute across replicas
    resolver 127.0.0.11 valid=5s ipv6=off;

    # TCP optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Client keepalive
    keepalive_timeout 65;
    keepalive_requests 10000;

    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Proxy keepalive to backends
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Disable access logs for throughput
    access_log off;

    server {
        listen 80;

        location /orders/ {
            set $order_upstream http://order-service:5000;
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass $order_upstream;
        }
        location /payment/ {
            set $payment_upstream http://payment-service:5000;
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_pass $payment_upstream;
        }
        location /stock/ {
            set $stock_upstream http://stock-service:5000;
            rewrite ^/stock/(.*)$ /$1 break;
            proxy_pass $stock_upstream;
        }
    }
}
