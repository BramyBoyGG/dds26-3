version: "3.8"

# LARGE CLUSTER: ~90 CPUs total (leaving ~6 for locust)
# - 8 replicas of each service with 2 workers each
# - Scaled Redis with more memory and IO threads
# Use: docker compose -f docker-compose-large.yml up --build

name: saga-large

services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      order-service:
        condition: service_started
      stock-service:
        condition: service_started
      payment-service:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '4'
    restart: always

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - REDIS_SENTINELS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=order-master
      - REDIS_PASSWORD=redis
      - STOCK_REDIS_MASTER_NAME=stock-master
      - STOCK_REDIS_PASSWORD=redis
      - PAYMENT_REDIS_MASTER_NAME=payment-master
      - PAYMENT_REDIS_PASSWORD=redis
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=warning app:app
    env_file:
      - env/order_redis.env
    depends_on:
      order-db:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'
    restart: always

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 4gb --appendonly yes --io-threads 6
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '6'
    restart: always

  order-db-replica:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --masterauth redis --maxmemory 4gb --appendonly yes --replicaof order-db 6379 --io-threads 4
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
    restart: always

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=warning app:app
    env_file:
      - env/stock_redis.env
    environment:
      - REDIS_SENTINELS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=stock-master
      - REDIS_PASSWORD=redis
      - ORDER_REDIS_MASTER_NAME=order-master
      - ORDER_REDIS_HOST=order-db
      - ORDER_REDIS_PORT=6379
      - ORDER_REDIS_PASSWORD=redis
      - ORDER_REDIS_DB=0
    depends_on:
      stock-db:
        condition: service_healthy
      order-db:
        condition: service_healthy
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'
    restart: always

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 4gb --appendonly yes --io-threads 6
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '6'
    restart: always

  stock-db-replica:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --masterauth redis --maxmemory 4gb --appendonly yes --replicaof stock-db 6379 --io-threads 4
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
    restart: always

  payment-service:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    image: user:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=warning app:app
    env_file:
      - env/payment_redis.env
    environment:
      - REDIS_SENTINELS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=payment-master
      - REDIS_PASSWORD=redis
      - ORDER_REDIS_MASTER_NAME=order-master
      - ORDER_REDIS_HOST=order-db
      - ORDER_REDIS_PORT=6379
      - ORDER_REDIS_PASSWORD=redis
      - ORDER_REDIS_DB=0
    depends_on:
      payment-db:
        condition: service_healthy
      order-db:
        condition: service_healthy
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'
    restart: always

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 4gb --appendonly yes --io-threads 6
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '6'
    restart: always

  payment-db-replica:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --masterauth redis --maxmemory 4gb --appendonly yes --replicaof payment-db 6379 --io-threads 4
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
    restart: always

  sentinel-1:
    image: redis:7.2-bookworm
    command: redis-sentinel /etc/redis/sentinel-1.conf
    volumes:
      - ./sentinel:/etc/redis
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
    ports:
      - "26379:26379"
    deploy:
      resources:
        limits:
          cpus: '1'
    restart: always

  sentinel-2:
    image: redis:7.2-bookworm
    command: redis-sentinel /etc/redis/sentinel-2.conf
    volumes:
      - ./sentinel:/etc/redis
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
    ports:
      - "26380:26379"
    deploy:
      resources:
        limits:
          cpus: '1'
    restart: always

  sentinel-3:
    image: redis:7.2-bookworm
    command: redis-sentinel /etc/redis/sentinel-3.conf
    volumes:
      - ./sentinel:/etc/redis
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
    ports:
      - "26381:26379"
    deploy:
      resources:
        limits:
          cpus: '1'
    restart: always

# CPU Summary (~90 CPUs total):
# - gateway: 4 CPUs
# - order-service x8: 16 CPUs (2 per replica)
# - stock-service x8: 16 CPUs (2 per replica)
# - payment-service x8: 16 CPUs (2 per replica)
# - order-db: 6 CPUs
# - order-db-replica: 4 CPUs
# - stock-db: 6 CPUs
# - stock-db-replica: 4 CPUs
# - payment-db: 6 CPUs
# - payment-db-replica: 4 CPUs
# - sentinel x3: 3 CPUs
# Total: 85 CPUs (leaving ~11 CPUs for locust and system overhead)
