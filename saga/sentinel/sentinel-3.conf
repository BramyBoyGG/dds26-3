port 26379

sentinel resolve-hostnames yes
sentinel announce-hostnames yes

sentinel monitor order-master order-db 6379 2
sentinel monitor payment-master payment-db 6379 2
sentinel monitor stock-master stock-db 6379 2

sentinel auth-pass order-master redis
sentinel auth-pass payment-master redis
sentinel auth-pass stock-master redis

sentinel down-after-milliseconds order-master 5000
sentinel down-after-milliseconds payment-master 5000
sentinel down-after-milliseconds stock-master 5000

sentinel failover-timeout order-master 10000
sentinel failover-timeout payment-master 10000
sentinel failover-timeout stock-master 10000

# Generated by CONFIG REWRITE
latency-tracking-info-percentiles 50 99 99.9
dir "/data"
user default on nopass sanitize-payload ~* &* +@all
sentinel myid aa92614e38bd5e9c74f11b72c872af25fb3ad45a
sentinel config-epoch order-master 0
sentinel leader-epoch order-master 2
sentinel config-epoch payment-master 0
sentinel leader-epoch payment-master 3
sentinel config-epoch stock-master 0
sentinel leader-epoch stock-master 1
sentinel current-epoch 3

sentinel known-replica order-master 172.18.0.5 6379

sentinel known-replica order-master 172.18.0.7 6379

sentinel known-replica payment-master 172.18.0.6 6379

sentinel known-sentinel order-master 172.18.0.10 26379 dc25b9c1058c883ef7aa8d4b37262b5a0583b255

sentinel known-sentinel order-master 172.18.0.9 26379 9e170651468f860726d59192d28d5add9b6569ec

sentinel known-sentinel payment-master 172.18.0.10 26379 dc25b9c1058c883ef7aa8d4b37262b5a0583b255

sentinel known-sentinel payment-master 172.18.0.9 26379 9e170651468f860726d59192d28d5add9b6569ec

sentinel known-sentinel stock-master 172.18.0.10 26379 dc25b9c1058c883ef7aa8d4b37262b5a0583b255

